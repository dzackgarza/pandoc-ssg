from: markdown+yaml_metadata_block+fenced_divs+tex_math_dollars+tex_math_single_backslash
to: html5
wrap: none
standalone: true
shift-heading-level-by: 1
toc: true
toc-depth: 3
html-math-method:
  method: mathjax
template: ${.}/../templates/blog.html
filters:
  - ${.}/../filters/transclude.lua
  # Compile \begin{tikzcd}/\begin{tikzpicture} RawBlocks to inline SVG (LaTeX ->
  # pdf2svg, hash-cached). Lives in ~/.pandoc (the author's canonical figure
  # toolchain); the build sets PANDOC_DIR so it finds its template + styles.
  - ${HOME}/.pandoc/filters/tikzcd.lua
  - ${.}/../filters/components.lua
  - ${.}/../filters/normalize_math.lua
