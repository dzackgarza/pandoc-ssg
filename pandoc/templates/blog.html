<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$</title>
<link rel="stylesheet" href="/assets/theme/site.css">
$if(mathjax_config)$
$mathjax_config$
$endif$
$if(math)$
$math$
$endif$
</head>
<body>
<nav>
$for(nav)$
<a href="$nav.href$">$nav.title$</a>
$endfor$
</nav>
<main>
<article>
<h1>$title$</h1>
$if(date)$<p class="post-date">$date$</p>$endif$
$if(toc)$
<nav class="post-toc" role="doc-toc">
$table-of-contents$
</nav>
$endif$
$body$
</article>
</main>
</body>
</html>
